name: ci

on:
  push:
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run workspace checks
        run: cargo run -p xtask -- ci
