name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: local-history-x86_64-unknown-linux-gnu
            binary_suffix: ""
          - os: ubuntu-24.04
            artifact_name: local-history-x86_64-ubuntu-24.04
            binary_suffix: ""
          - os: macos-13
            artifact_name: local-history-x86_64-apple-darwin
            binary_suffix: ""
          - os: macos-14
            artifact_name: local-history-aarch64-apple-darwin
            binary_suffix: ""
          - os: windows-latest
            artifact_name: local-history-x86_64-pc-windows-msvc
            binary_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/local-history${{ matrix.binary_suffix }} dist/
          cp target/release/local-history-sidecar${{ matrix.binary_suffix }} dist/
          cp README.md LICENSE dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist
