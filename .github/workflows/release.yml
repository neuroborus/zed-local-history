name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: local-history-x86_64-unknown-linux-gnu
            release_archive_name: local-history-x86_64-unknown-linux-gnu.tar.gz
            binary_suffix: ""
            sidecar_asset_stem: local-history-sidecar-x86_64-unknown-linux-gnu
            sidecar_archive_name: local-history-sidecar-x86_64-unknown-linux-gnu.tar.gz
            mcp_asset_stem: local-history-mcp-x86_64-unknown-linux-gnu
            mcp_archive_name: local-history-mcp-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04
            artifact_name: local-history-x86_64-ubuntu-24.04
            release_archive_name: local-history-x86_64-ubuntu-24.04.tar.gz
            binary_suffix: ""
            sidecar_asset_stem: local-history-sidecar-x86_64-ubuntu-24.04
            sidecar_archive_name: local-history-sidecar-x86_64-ubuntu-24.04.tar.gz
            mcp_asset_stem: local-history-mcp-x86_64-ubuntu-24.04
            mcp_archive_name: local-history-mcp-x86_64-ubuntu-24.04.tar.gz
          - os: ubuntu-24.04-arm
            artifact_name: local-history-aarch64-unknown-linux-gnu
            release_archive_name: local-history-aarch64-unknown-linux-gnu.tar.gz
            binary_suffix: ""
            sidecar_asset_stem: local-history-sidecar-aarch64-unknown-linux-gnu
            sidecar_archive_name: local-history-sidecar-aarch64-unknown-linux-gnu.tar.gz
            mcp_asset_stem: local-history-mcp-aarch64-unknown-linux-gnu
            mcp_archive_name: local-history-mcp-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            artifact_name: local-history-x86_64-apple-darwin
            release_archive_name: local-history-x86_64-apple-darwin.tar.gz
            binary_suffix: ""
            sidecar_asset_stem: local-history-sidecar-x86_64-apple-darwin
            sidecar_archive_name: local-history-sidecar-x86_64-apple-darwin.tar.gz
            mcp_asset_stem: local-history-mcp-x86_64-apple-darwin
            mcp_archive_name: local-history-mcp-x86_64-apple-darwin.tar.gz
          - os: macos-14
            artifact_name: local-history-aarch64-apple-darwin
            release_archive_name: local-history-aarch64-apple-darwin.tar.gz
            binary_suffix: ""
            sidecar_asset_stem: local-history-sidecar-aarch64-apple-darwin
            sidecar_archive_name: local-history-sidecar-aarch64-apple-darwin.tar.gz
            mcp_asset_stem: local-history-mcp-aarch64-apple-darwin
            mcp_archive_name: local-history-mcp-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            artifact_name: local-history-x86_64-pc-windows-msvc
            release_archive_name: local-history-x86_64-pc-windows-msvc.zip
            binary_suffix: ".exe"
            sidecar_asset_stem: local-history-sidecar-x86_64-pc-windows-msvc
            sidecar_archive_name: local-history-sidecar-x86_64-pc-windows-msvc.zip
            mcp_asset_stem: local-history-mcp-x86_64-pc-windows-msvc
            mcp_archive_name: local-history-mcp-x86_64-pc-windows-msvc.zip
          - os: windows-11-arm
            artifact_name: local-history-aarch64-pc-windows-msvc
            release_archive_name: local-history-aarch64-pc-windows-msvc.zip
            binary_suffix: ".exe"
            sidecar_asset_stem: local-history-sidecar-aarch64-pc-windows-msvc
            sidecar_archive_name: local-history-sidecar-aarch64-pc-windows-msvc.zip
            mcp_asset_stem: local-history-mcp-aarch64-pc-windows-msvc
            mcp_archive_name: local-history-mcp-aarch64-pc-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/local-history${{ matrix.binary_suffix }} dist/
          cp target/release/local-history-sidecar${{ matrix.binary_suffix }} dist/
          cp target/release/local-history-mcp${{ matrix.binary_suffix }} dist/
          cp scripts/install.sh dist/
          cp README.md LICENSE dist/

      - name: Package release bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package/${{ matrix.artifact_name }}
          cp dist/local-history dist/local-history-sidecar dist/local-history-mcp dist/install.sh dist/README.md dist/LICENSE package/${{ matrix.artifact_name }}/
          chmod 0755 package/${{ matrix.artifact_name }}/install.sh
          tar -czf dist/${{ matrix.release_archive_name }} -C package ${{ matrix.artifact_name }}

      - name: Package release bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "package/${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "dist/local-history.exe" "package/${{ matrix.artifact_name }}/local-history.exe"
          Copy-Item "dist/local-history-sidecar.exe" "package/${{ matrix.artifact_name }}/local-history-sidecar.exe"
          Copy-Item "dist/local-history-mcp.exe" "package/${{ matrix.artifact_name }}/local-history-mcp.exe"
          Copy-Item "dist/README.md" "package/${{ matrix.artifact_name }}/README.md"
          Copy-Item "dist/LICENSE" "package/${{ matrix.artifact_name }}/LICENSE"
          Compress-Archive -Path "package/${{ matrix.artifact_name }}" -DestinationPath "dist/${{ matrix.release_archive_name }}" -Force

      - name: Package sidecar archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package/${{ matrix.sidecar_asset_stem }}
          cp target/release/local-history-sidecar package/${{ matrix.sidecar_asset_stem }}/local-history-sidecar
          tar -czf dist/${{ matrix.sidecar_archive_name }} -C package ${{ matrix.sidecar_asset_stem }}

      - name: Package sidecar archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "package/${{ matrix.sidecar_asset_stem }}" | Out-Null
          Copy-Item "target/release/local-history-sidecar.exe" "package/${{ matrix.sidecar_asset_stem }}/local-history-sidecar.exe"
          Compress-Archive -Path "package/${{ matrix.sidecar_asset_stem }}" -DestinationPath "dist/${{ matrix.sidecar_archive_name }}" -Force

      - name: Package MCP archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package/${{ matrix.mcp_asset_stem }}
          cp target/release/local-history-mcp package/${{ matrix.mcp_asset_stem }}/local-history-mcp
          tar -czf dist/${{ matrix.mcp_archive_name }} -C package ${{ matrix.mcp_asset_stem }}

      - name: Package MCP archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "package/${{ matrix.mcp_asset_stem }}" | Out-Null
          Copy-Item "target/release/local-history-mcp.exe" "package/${{ matrix.mcp_asset_stem }}/local-history-mcp.exe"
          Compress-Archive -Path "package/${{ matrix.mcp_asset_stem }}" -DestinationPath "dist/${{ matrix.mcp_archive_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist

      - name: Upload release asset artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/${{ matrix.release_archive_name }}

      - name: Upload sidecar release asset artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.sidecar_asset_stem }}
          path: dist/${{ matrix.sidecar_archive_name }}

      - name: Upload MCP release asset artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.mcp_asset_stem }}
          path: dist/${{ matrix.mcp_archive_name }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release asset artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
