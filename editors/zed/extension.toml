id = "local-history"
name = "Local History"
version = "0.1.0"
description = "Recover previous file saves when Git is not enough — watcher, CLI, Markdown history, and Agent MCP tools"
authors = ["neuroborus"]
repository = "https://github.com/neuroborus/zed-local-history"
schema_version = 1

# Required for sidecar slash commands, MCP version probes, and release bootstrap.
# Cached binaries live under versioned paths such as
# local-history-mcp-0.1.0/local-history-mcp-x86_64-unknown-linux-gnu/local-history-mcp
capabilities = [
  { kind = "process:exec", command = "local-history-sidecar", args = ["**"] },
  { kind = "process:exec", command = "local-history-sidecar.exe", args = ["**"] },
  { kind = "process:exec", command = "local-history-mcp", args = ["**"] },
  { kind = "process:exec", command = "local-history-mcp.exe", args = ["**"] },
  { kind = "process:exec", command = "*", args = ["**"] },
  { kind = "download_file", host = "github.com", path = ["neuroborus", "zed-local-history", "**"] },
]

[context_servers.local-history]

[slash_commands.local-history-status]
description = "Show local-history watcher and storage status"
requires_argument = false
tooltip_text = "Show local-history status"

[slash_commands.local-history-start-watcher]
description = "Start the local-history watcher for the current project"
requires_argument = false
tooltip_text = "Start local-history watcher"

[slash_commands.local-history-view]
description = "Show the root path of the generated Markdown history view"
requires_argument = false
tooltip_text = "Show Markdown view root"

[slash_commands.local-history-current-hour]
description = "Generate and show the current hour Markdown history path"
requires_argument = false
tooltip_text = "Show current hour history"

[slash_commands.local-history-current-segment]
description = "Generate and show the current 10-minute segment Markdown history path"
requires_argument = false
tooltip_text = "Show current segment history"

[slash_commands.local-history-previous-hour]
description = "Generate and show the previous hour Markdown history path"
requires_argument = false
tooltip_text = "Show previous hour history"

[slash_commands.local-history-hour]
description = "Generate and show a specific hour Markdown history path"
requires_argument = true
tooltip_text = "Show hour history"

[slash_commands.local-history-segment]
description = "Generate and show the 10-minute segment containing a specific ISO timestamp"
requires_argument = true
tooltip_text = "Show segment history"

[slash_commands.local-history-restore]
description = "Restore a snapshot by exact snapshot ID"
requires_argument = true
tooltip_text = "Restore snapshot"
